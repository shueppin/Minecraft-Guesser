<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mob Daily</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1 class="page-title"><a href="index.html">Mob Daily</a></h1>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search for a mob...">
        <div id="searchHeader"></div>
        <div id="searchResults"></div>
    </div>

    <div id="scoreContainer"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Mob</th>
                    <th>Release</th>
                    <th>Health</th>
                    <th>Height</th>
                    <th>Behavior</th>
                    <th>Spawn</th>
                    <th>Classification</th>
                </tr>
            </thead>
            <tbody id="guessTable"></tbody>
        </table>
    </div>

</div>

<script>
window.GAME_CONFIG = {
    type: 'mobs',
    dataFile: 'data/mobs.json',
    fields: [
        'initial_release',
        'health',
        'height',
        'behavior',
        'spawn',
        'classification'
    ]
};

window.GAME_FIELDS_CONFIG = [
    { key: 'initial_release', label: 'Release' },
    { key: 'health', label: 'Health' },
    { key: 'height', label: 'Height' },
    { key: 'behavior', label: 'Behavior' },
    { key: 'spawn', label: 'Spawn' },
    { key: 'classification', label: 'Classification' }
];
</script>
<script src="script.js"></script>

</body>
</html>
