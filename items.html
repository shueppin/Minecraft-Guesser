<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Daily</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1 class="page-title"><a href="index.html">Item Daily</a></h1>
    <h2>The data of this project is obtained from the <a href="https://minecraft.wiki">Minecraft wiki</a>.</h2>
    <h2>This project is inspired by <a href="https://mcdle.net">mcdle.net</a>.</h2>
    <br/>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search for an item...">
        <div id="searchHeader"></div>
        <div id="searchResults"></div>
    </div>

    <div id="scoreContainer"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr id="guessTableHead">
                    <!-- Automatically filled by renderGuessTableHead -->
                </tr>
            </thead>
            <tbody id="guessTable"></tbody>
        </table>
    </div>

</div>

<script>
window.GAME_CONFIG = {
    type: 'items',
    dataFile: 'data/items.json',
    displayName: 'Item'
};

window.GAME_FIELDS_CONFIG = [
    { key: 'initial_release', label: 'First Released' },
    { key: 'stackable', label: 'Stack Size' },
    { key: 'rarity', label: 'Rarity' },
    { key: 'renewable', label: 'Renewable' },
    { key: 'obtaining', label: 'Obtaining' },
    { key: 'drops_from_block', label: 'Drops from block' }
];
</script>
<script src="script.js"></script>

</body>
</html>
