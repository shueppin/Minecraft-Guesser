<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Daily</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1 class="page-title"><a href="index.html">Item Daily</a></h1>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search for an item...">
        <div id="searchHeader"></div>
        <div id="searchResults"></div>
    </div>

    <div id="scoreContainer"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Release</th>
                    <th>Stack Size</th>
                    <th>Rarity</th>
                    <th>Creative Inv. Category</th>
                    <th>Renewable</th>
                    <th>Recipe</th>
                    <th>Loot</th>
                </tr>
            </thead>
            <tbody id="guessTable"></tbody>
        </table>
    </div>

</div>

<script>
window.GAME_CONFIG = {
    type: 'items',
    dataFile: 'data/items.json',
    fields: [
        'initial_release',
        'stackable',
        'rarity',
        'inventory_categories',
        'renewable',
        'recipe',
        'loot'
    ]
};

window.GAME_FIELDS_CONFIG = [
    { key: 'initial_release', label: 'Release' },
    { key: 'stackable', label: 'Stack Size' },
    { key: 'rarity', label: 'Rarity' },
    { key: 'inventory_categories', label: 'Creative Inv. Category' },
    { key: 'renewable', label: 'Renewable' },
    { key: 'recipe', label: 'Recipe' },
    { key: 'loot', label: 'Loot' }
];
</script>
<script src="script.js"></script>

</body>
</html>
