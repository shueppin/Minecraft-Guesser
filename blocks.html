<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Daily</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1 class="page-title"><a href="index.html">Block Daily</a></h1>
    <h2>The data of this project is obtained from the <a href="https://minecraft.wiki">Minecraft wiki</a>.</h2>
    <h2>This project is inspired by <a href="https://mcdle.net">mcdle.net</a>.</h2>
    <br/>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search for a block...">
        <div id="searchHeader"></div>
        <div id="searchResults"></div>
    </div>

    <div id="scoreContainer"></div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr id="guessTableHead">
                    <!-- Automatically filled by renderGuessTableHead -->
                </tr>
            </thead>
            <tbody id="guessTable"></tbody>
        </table>
    </div>

</div>

<script>
window.GAME_CONFIG = {
    type: 'blocks',
    dataFile: 'data/blocks.json',
    displayName: 'Block'
};

window.GAME_FIELDS_CONFIG = [
    { key: 'initial_release', label: 'Release' },
    { key: 'stackable', label: 'Stack Size' },
    { key: 'tool', label: 'Tool(s)' },
    { key: 'blast_resistance', label: 'Blast Resistance' },
    { key: 'hardness', label: 'Hardness' },
    { key: 'flammable', label: 'Flammable' },
    { key: 'transparent', label: 'Transparent' },
    { key: 'luminous', label: 'Luminous' }
];
</script>
<script src="script.js"></script>

</body>
</html>
